<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>なぞり書き練習 — WriteApt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1 class="header__title">なぞり書き練習</h1>
    <p class="header__subtitle">半透明の文字の上をなぞって練習しましょう</p>
  </header>

  <main class="main">
    <section class="panel panel--controls" aria-label="設定">
      <label class="field">
        <span class="field__label">練習テキスト</span>
        <textarea
          id="practice-text"
          class="field__textarea"
          rows="4"
          placeholder="ここに練習したい文字を入力してください&#10;例：あいうえお&#10;     ABCDEFG"
        >あいうえお
かきくけこ
さしすせそ</textarea>
      </label>

      <div class="controls">
        <label class="control">
          <span class="control__label">文字サイズ</span>
          <input type="range" id="font-size" min="24" max="120" value="64">
          <span id="font-size-value" class="control__value">64px</span>
        </label>

        <label class="control">
          <span class="control__label">行間</span>
          <input type="range" id="line-height" min="1.2" max="3" step="0.1" value="1.8">
          <span id="line-height-value" class="control__value">1.8</span>
        </label>

        <label class="control">
          <span class="control__label">ペンの太さ</span>
          <input type="range" id="stroke-width" min="1" max="12" value="3">
          <span id="stroke-width-value" class="control__value">3px</span>
        </label>

        <label class="control">
          <span class="control__label">ガイドの濃さ</span>
          <input type="range" id="guide-opacity" min="0.05" max="0.5" step="0.05" value="0.2">
          <span id="guide-opacity-value" class="control__value">20%</span>
        </label>
      </div>

      <div class="actions">
        <button type="button" id="btn-clear" class="btn btn--secondary">なぞりを消す</button>
        <button type="button" id="btn-undo" class="btn btn--secondary">ひとつ戻す</button>
        <button type="button" id="btn-update" class="btn btn--primary">テキストを反映</button>
      </div>
    </section>

    <section class="panel panel--canvas" aria-label="練習エリア">
      <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas id="guide-canvas" aria-hidden="true"></canvas>
        <canvas id="draw-canvas" aria-label="なぞり書きキャンバス"></canvas>
      </div>
      <p class="hint">マウス・指・ペンで文字の上をなぞってください</p>
    </section>
  </main>

  <footer class="footer">
    <p>WriteApt — 文字練習アプリ</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
