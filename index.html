<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>なぞり・ぬりえ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <main class="stage">
      <div class="canvas-wrapper canvas-wrapper--guide-back" id="canvas-wrapper">
        <canvas id="guide-canvas" aria-hidden="true"></canvas>
        <canvas id="draw-canvas" aria-label="おえかき"></canvas>

        <div id="image-edit-bar" class="edit-bar hidden">
          <p class="edit-bar__msg">うごかしてね</p>
          <div class="edit-bar__btns">
            <button type="button" id="btn-image-smaller" class="big-btn big-btn--round" aria-label="ちいさく">−</button>
            <button type="button" id="btn-image-bigger" class="big-btn big-btn--round" aria-label="おおきく">＋</button>
            <button type="button" id="btn-confirm-image" class="big-btn big-btn--ok">できた！</button>
          </div>
        </div>
      </div>
    </main>

    <nav class="dock" aria-label="どうぐ">
      <div class="dock__row">
        <button type="button" id="tool-pen" class="big-btn big-btn--tool big-btn--active" data-tool="pen" aria-pressed="true">
          <span class="big-btn__icon">✏️</span>
          <span class="big-btn__label">えんぴつ</span>
        </button>
        <button type="button" id="tool-fill" class="big-btn big-btn--tool" data-tool="fill" aria-pressed="false">
          <span class="big-btn__icon">🪣</span>
          <span class="big-btn__label">ぬる</span>
        </button>
        <label class="big-btn big-btn--tool big-btn--photo">
          <span class="big-btn__icon">📷</span>
          <span class="big-btn__label">しゃしん</span>
          <input type="file" id="image-input" accept="image/*" hidden>
        </label>
      </div>

      <div class="dock__colors" id="color-palette" role="group" aria-label="いろ"></div>

      <div class="dock__row">
        <button type="button" id="guide-layer-back" class="big-btn big-btn--mode big-btn--active" data-layer="back" aria-pressed="true">
          <span class="big-btn__icon">👻</span>
          <span class="big-btn__label">なぞる</span>
        </button>
        <button type="button" id="guide-layer-front" class="big-btn big-btn--mode" data-layer="front" aria-pressed="false">
          <span class="big-btn__icon">🎨</span>
          <span class="big-btn__label">ぬりえ</span>
        </button>
        <button type="button" id="btn-undo" class="big-btn big-btn--sub">
          <span class="big-btn__icon">↩️</span>
          <span class="big-btn__label">もどす</span>
        </button>
        <button type="button" id="btn-clear" class="big-btn big-btn--sub">
          <span class="big-btn__icon">🗑️</span>
          <span class="big-btn__label">けす</span>
        </button>
      </div>
    </nav>

    <details class="grownup">
      <summary>おとな用</summary>
      <div class="grownup__body">
        <label class="grownup__field">
          <span>もじ</span>
          <textarea id="practice-text" rows="2">あいうえお</textarea>
        </label>
        <input type="hidden" id="font-size" value="64">
        <input type="hidden" id="line-height" value="1.8">
        <input type="hidden" id="stroke-width" value="8">
        <input type="hidden" id="guide-opacity" value="0.3">
        <input type="hidden" id="image-scale" value="100">
        <input type="hidden" id="image-pos-x" value="0">
        <input type="hidden" id="image-pos-y" value="0">
        <button type="button" id="btn-reedit-image" class="grownup__btn hidden">しゃしんをなおす</button>
        <button type="button" id="btn-remove-image" class="grownup__btn hidden">しゃしんをけす</button>
      </div>
    </details>
  </div>

  <script src="app.js"></script>
</body>
</html>
