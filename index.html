<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>文字練習</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">文字練習</h1>
      <p class="subtitle">グレーの文字の上をなぞって練習しましょう</p>
    </header>

    <section class="controls">
      <div class="control-group control-group--full">
        <label for="practice-text">練習する文字</label>
        <textarea id="practice-text" rows="3" placeholder="ここに練習したい文字や文章を入力してください">あいうえお
かきくけこ</textarea>
      </div>

      <div class="control-row">
        <div class="control-group">
          <label for="font-size">文字サイズ <span id="font-size-value">72</span>px</label>
          <input type="range" id="font-size" min="24" max="160" value="72">
        </div>

        <div class="control-group">
          <label for="pen-size">ペンの太さ <span id="pen-size-value">4</span>px</label>
          <input type="range" id="pen-size" min="1" max="20" value="4">
        </div>

        <div class="control-group">
          <label for="template-opacity">見本の濃さ <span id="template-opacity-value">25</span>%</label>
          <input type="range" id="template-opacity" min="5" max="60" value="25">
        </div>
      </div>

      <div class="button-row">
        <button type="button" id="btn-apply" class="btn btn-primary">文字を反映</button>
        <button type="button" id="btn-undo" class="btn">ひとつ戻す</button>
        <button type="button" id="btn-clear" class="btn btn-danger">なぞりを消す</button>
      </div>
    </section>

    <section class="practice-section">
      <div class="practice-wrapper" id="practice-wrapper">
        <canvas id="template-canvas" aria-hidden="true"></canvas>
        <canvas id="draw-canvas" aria-label="文字練習キャンバス。マウスや指でなぞってください。"></canvas>
      </div>
      <p class="hint">見本の文字の上を、マウスや指でなぞってください</p>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
